<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammy Joki Professional</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:#fff;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:30px;
font-weight:700;
background:linear-gradient(90deg,#00f5ff,#00ffae);
-webkit-background-clip:text;
color:transparent;
}

.card{
background:#111827;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,255,200,0.15);
}

.card h3{margin-bottom:15px;}

select,input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
border:none;
background:#1e293b;
color:#fff;
}

button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn-primary{
background:linear-gradient(90deg,#00f5ff,#00ffae);
color:#000;
}

.btn-dark{
background:#0f172a;
border:1px solid #00ffae;
color:#00ffae;
}

.total-box{
background:#0f172a;
padding:12px;
border-radius:12px;
margin-bottom:10px;
text-align:center;
font-weight:bold;
color:#00ffae;
}

.ewallet-container{
display:flex;
flex-direction:column;
gap:12px;
}

.ewallet{
padding:15px;
border-radius:16px;
cursor:pointer;
transition:0.3s;
border:1px solid #1e293b;
}

.ewallet-name{font-weight:bold;font-size:16px;}
.ewallet-number{font-size:14px;margin-top:4px;opacity:0.9;}

.dana{background:linear-gradient(90deg,#0081ff,#00c6ff);}
.gopay{background:linear-gradient(90deg,#00aaff,#0066ff);}
.ovo{background:linear-gradient(90deg,#7f00ff,#e100ff);}

.ewallet:hover{
transform:scale(1.03);
box-shadow:0 0 20px rgba(0,255,200,0.4);
}

.qris{
display:block;
margin:15px auto;
width:220px;
border-radius:16px;
box-shadow:0 0 25px rgba(0,255,200,0.4);
}

#preview{
display:none;
width:100%;
border-radius:15px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>SAMMY JOKI</h1>
<p style="color:#94a3b8;">Fast • Trusted • Professional</p>
</div>

<div class="card">
<h3>Form Order</h3>

<select id="layanan" onchange="hitung()">
<option value="">Pilih Layanan</option>
<option value="level1">LEVEL - Sea 1 (5K / 100 LV)</option>
<option value="level2">LEVEL - Sea 2 (4K / 100 LV)</option>
<option value="level3">LEVEL - Sea 3 (5K / 100 LV)</option>
<option value="belly1">BELLY - Sea 1 (7K / 1JT)</option>
<option value="belly2">BELLY - Sea 2 (6K / 1JT)</option>
<option value="belly3">BELLY - Sea 3 (5K / 1JT)</option>
</select>

<input type="number" id="jumlah" placeholder="Masukkan jumlah paket" oninput="hitung()">
<input type="text" id="username" placeholder="Username Game">
<input type="password" id="password" placeholder="Password Game">

<div class="total-box" id="total">Total: Rp 0</div>

<button class="btn-primary" onclick="order()">ORDER SEKARANG</button>
</div>

<div class="card">
<h3>Metode Pembayaran</h3>

<div class="ewallet-container">
<div class="ewallet dana" onclick="copyText('08811397381')">
<div class="ewallet-name">DANA</div>
<div class="ewallet-number">08811397381</div>
</div>

<div class="ewallet gopay" onclick="copyText('08984356112')">
<div class="ewallet-name">GOPAY</div>
<div class="ewallet-number">08984356112</div>
</div>

<div class="ewallet ovo" onclick="copyText('08984356112')">
<div class="ewallet-name">OVO</div>
<div class="ewallet-number">08984356112</div>
</div>
</div>

<hr style="margin:20px 0;border:1px solid #1e293b;">

<h4 style="text-align:center;">QRIS All Payment</h4>

<img src="https://raw.githubusercontent.com/sammy584/sammy-joki/main/qris.png" class="qris">

<p style="text-align:center;font-size:13px;color:#94a3b8;">
Scan QRIS lalu upload bukti transfer
</p>

<input type="file" id="bukti" accept="image/*">
<img id="preview">

<button class="btn-dark" onclick="kirimWA()">
Kirim Bukti ke WhatsApp
</button>

</div>

</div>

<script>
function hitung(){
let layanan=document.getElementById("layanan").value;
let jumlah=parseInt(document.getElementById("jumlah").value)||0;
let harga=0;

if(layanan=="level1") harga=5000;
if(layanan=="level2") harga=4000;
if(layanan=="level3") harga=5000;
if(layanan=="belly1") harga=7000;
if(layanan=="belly2") harga=6000;
if(layanan=="belly3") harga=5000;

let total=harga*jumlah;
document.getElementById("total").innerHTML="Total: Rp "+total.toLocaleString("id-ID");
}

function order(){
let layanan=document.getElementById("layanan").options[document.getElementById("layanan").selectedIndex].text;
let jumlah=document.getElementById("jumlah").value;
let username=document.getElementById("username").value;
let password=document.getElementById("password").value;
let total=document.getElementById("total").innerText;

if(layanan==""||jumlah==""||username==""||password==""){
alert("Lengkapi semua data!");
return;
}

let pesan="Halo Admin%0A%0ALayanan: "+layanan+
"%0AJumlah: "+jumlah+
"%0A"+total+
"%0AUsername: "+username+
"%0APassword: "+password;

window.open("https://wa.me/6283107288718?text="+pesan);
}

function copyText(text){
navigator.clipboard.writeText(text);
alert("Nomor berhasil disalin!");
}

let fileInput=document.getElementById("bukti");
let preview=document.getElementById("preview");

fileInput.addEventListener("change",function(){
let file=this.files[0];
if(file){
let reader=new FileReader();
reader.onload=function(e){
preview.src=e.target.result;
preview.style.display="block";
}
reader.readAsDataURL(file);
}
});

function kirimWA(){
window.open("https://wa.me/6283107288718?text=Halo Admin Saya Sudah Transfer QRIS. Berikut Bukti Transfer Saya.");
}
</script>

</body>
  </html>
