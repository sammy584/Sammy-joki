<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAYMENT PREMIUM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

/* BACKGROUND ANIMASI */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#00cfff22,#000 60%);
animation:bgmove 10s linear infinite;
z-index:-1;
}

@keyframes bgmove{
0%{transform:translate(0,0);}
50%{transform:translate(-200px,-200px);}
100%{transform:translate(0,0);}
}

/* LOGO */
.logo{
text-align:center;
font-size:40px;
font-weight:bold;
margin-top:40px;
color:#7ddfff;
text-shadow:0 0 10px #00cfff,0 0 20px #00cfff;
animation:glow 3s ease-in-out infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #00cfff;}
to{text-shadow:0 0 30px #00ffff;}
}

/* STATUS */
.status{
text-align:center;
margin:20px;
font-size:18px;
}

.online{color:#00ffcc;}
.offline{color:red;}

/* CARD */
.card{
background:#111;
border:1px solid #00cfff;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px #00cfff55;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00cfff;
color:#000;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00ffff;
box-shadow:0 0 15px #00ffff;
}

/* LOADING */
.loading{
display:none;
text-align:center;
margin-top:10px;
}

.money{
position:fixed;
font-size:30px;
animation:moneyFall 2s linear forwards;
}

@keyframes moneyFall{
0%{top:-50px;opacity:1;}
100%{top:100vh;opacity:0;}
}

.section{
height:500px;
padding:30px;
}
</style>
</head>
<body>

<div class="logo">SAMMY PAYMENT</div>

<div class="status">
Status: <span id="status" class="online">ONLINE</span>
</div>

<div class="card">
<h3>Metode Pembayaran</h3>
<p>DANA: 08811397381</p>
<p>GOPAY: 08984356112</p>
<p>OVO: 08984356112</p>
<p>QRIS: Minta Admin</p>
<button onclick="kirimWA()">Minat? WhatsApp</button>
<div class="loading" id="loading">Mengirim...</div>
</div>

<div class="card">
<button onclick="playSound()">Nyalakan Sound Batidao</button>
</div>

<div class="section"></div>
<div class="section"></div>
<div class="section"></div>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
function kirimWA(){
document.getElementById("loading").style.display="block";
setTimeout(function(){
window.location.href="https://wa.me/6283107288718?text=Halo%20saya%20minat";
},2000);
}

function playSound(){
let sound=document.getElementById("sound");
sound.volume=1.0;
sound.play();
alert("Pembayaran Berhasil!");
for(let i=0;i<10;i++){
let money=document.createElement("div");
money.innerHTML="💸";
money.className="money";
money.style.left=Math.random()*100+"vw";
document.body.appendChild(money);
setTimeout(()=>{money.remove();},2000);
}
}

setInterval(function(){
let status=document.getElementById("status");
if(status.innerHTML=="ONLINE"){
status.innerHTML="OFFLINE";
status.className="offline";
}else{
status.innerHTML="ONLINE";
status.className="online";
}
},10000);
</script>

</body>
</html>
