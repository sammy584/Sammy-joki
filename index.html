<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMMY JOKI STORE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
background:#0a0f1c;
color:#fff;
}

.logo{
text-align:center;
font-size:38px;
margin:30px 0;
color:#00e0ff;
text-shadow:0 0 20px #00e0ff;
}

.card{
background:#111827;
margin:20px;
padding:20px;
border-radius:16px;
box-shadow:0 0 20px #00e0ff33;
}

select,input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:12px;
background:#00e0ff;
color:#000;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}
button:hover{
background:#00ffff;
box-shadow:0 0 15px #00ffff;
}

.copy{
background:#0a0f1c;
border:1px solid #00e0ff;
padding:10px;
margin-top:8px;
border-radius:10px;
text-align:center;
cursor:pointer;
}
.copy:hover{
background:#00e0ff22;
}

#preview{
display:none;
width:100%;
margin-top:15px;
border-radius:12px;
box-shadow:0 0 15px #00e0ff55;
cursor:pointer;
}
</style>
</head>
<body>

<div class="logo">SAMMY JOKI STORE</div>

<div class="card">
<h3>ORDER JOKI BLOX FRUIT</h3>

<select id="layanan">
<option>Level Sea 1</option>
<option>Level Sea 2</option>
<option>Level Sea 3</option>
<option>Belly Farm</option>
</select>

<input type="text" id="user" placeholder="Username Game">

<button onclick="order()">ORDER SEKARANG</button>
</div>

<div class="card">
<h3>METODE PEMBAYARAN</h3>

<div class="copy" onclick="copyText('08811397381')">DANA: 08811397381</div>
<div class="copy" onclick="copyText('08984356112')">GOPAY: 08984356112</div>
<div class="copy" onclick="copyText('08984356112')">OVO: 08984356112</div>

<hr style="margin:15px 0;border:1px solid #00e0ff33;">

<h4 style="text-align:center;">QRIS ALL PAYMENT</h4>

<img src="https://raw.githubusercontent.com/sammy584/sammy-joki/main/qris.png"
style="width:220px;display:block;margin:15px auto;border-radius:12px;border:2px solid #00e0ff;box-shadow:0 0 20px #00e0ff55;">

<p style="text-align:center;font-size:13px;color:#aaa;">
Scan QRIS lalu upload bukti transfer
</p>

<input type="file" id="bukti" accept="image/*">

<img id="preview" onclick="besarGambar()">

<button onclick="kirimWA()">Kirim Bukti ke WhatsApp</button>

</div>

<script>
function order(){
let layanan=document.getElementById("layanan").value;
let user=document.getElementById("user").value;

if(user==""){
alert("Isi Username dulu!");
return;
}

window.open("https://wa.me/6283107288718?text=Halo%20Admin%0ALayanan:%20"+layanan+"%0AUsername:%20"+user);
}

function copyText(text){
navigator.clipboard.writeText(text);
alert("Nomor berhasil disalin!");
}

let fileInput=document.getElementById("bukti");
let preview=document.getElementById("preview");

fileInput.addEventListener("change",function(){
let file=this.files[0];
if(file){
let reader=new FileReader();
reader.onload=function(e){
preview.src=e.target.result;
preview.style.display="block";
}
reader.readAsDataURL(file);
}
});

function besarGambar(){
if(preview.style.width=="100%"){
preview.style.width="220px";
preview.style.margin="15px auto";
preview.style.display="block";
}else{
preview.style.width="100%";
}
}

function kirimWA(){
window.open("https://wa.me/6283107288718?text=Halo%20Admin%20Saya%20Sudah%20Transfer%20QRIS.%20Berikut%20Bukti%20Transfer%20Saya");
}
</script>

</body>
</html>
